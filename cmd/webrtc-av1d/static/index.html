<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC AV1 Capture</title>
    <style>
        :root {
            --bg: #0d1110;
            --panel: #171d1b;
            --panel-2: #101513;
            --line: #2c3733;
            --text: #edf3ef;
            --muted: #92a09a;
            --accent: #e3a72f;
            --accent-dark: #5e4515;
            --good: #4fc47a;
            --bad: #ed6a5a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background: radial-gradient(circle at 12% 8%, rgba(227, 167, 47, .12), transparent 28rem),
                        linear-gradient(135deg, #0d1110 0%, #101815 55%, #0b0f0e 100%);
            font-family: "Segoe UI", Tahoma, sans-serif;
        }
        main { width: min(900px, calc(100% - 32px)); margin: 0 auto; padding: 34px 0 48px; }
        header { margin-bottom: 22px; }
        h1 { margin: 0 0 7px; font-size: clamp(1.55rem, 4vw, 2.35rem); letter-spacing: -.035em; }
        .subtitle { margin: 0; color: var(--muted); font-size: .9rem; }
        .card {
            margin-bottom: 16px;
            padding: 20px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(23, 29, 27, .94);
            box-shadow: 0 20px 55px rgba(0, 0, 0, .2);
        }
        .card h2 { margin: 0 0 14px; color: #c7d1cc; font-size: .78rem; letter-spacing: .12em; text-transform: uppercase; }
        .source-grid { display: grid; grid-template-columns: 140px minmax(0, 1fr) 170px auto; gap: 10px; margin-bottom: 14px; }
        label { display: grid; gap: 6px; color: var(--muted); font-size: .76rem; }
        select, input[type="text"], button {
            min-height: 40px;
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--text);
            background: var(--panel-2);
            font: inherit;
        }
        select, input[type="text"] { width: 100%; padding: 0 11px; }
        select:focus, input[type="text"]:focus, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        input:disabled { cursor: not-allowed; opacity: .42; }
        button { padding: 0 18px; cursor: pointer; transition: border-color .15s, background .15s, opacity .15s; }
        button:hover:not(:disabled) { border-color: #65736d; }
        button:disabled { cursor: not-allowed; opacity: .42; }
        #btnStart { border-color: #947022; background: var(--accent); color: #171109; font-weight: 700; }
        #btnStop { border-color: #713b34; background: #39201d; color: #ffc4bb; }
        #btnRefresh { align-self: end; }
        .ice-grid { display: grid; grid-template-columns: 170px minmax(0, 1fr); gap: 10px; margin-bottom: 14px; }
        .stun-switch {
            display: flex;
            align-items: center;
            align-self: end;
            min-height: 40px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel-2);
            cursor: pointer;
        }
        .stun-switch input { width: 16px; height: 16px; margin: 0 9px 0 0; accent-color: var(--accent); }
        .stun-switch:has(input:focus-visible) { outline: 2px solid var(--accent); outline-offset: 2px; }
        .stun-switch:has(input:disabled) { cursor: not-allowed; opacity: .42; }
        .preview-shell {
            position: relative;
            overflow: hidden;
            min-height: 270px;
            border: 1px solid #27302d;
            border-radius: 10px;
            background: #050706;
        }
        video { display: block; width: 100%; min-height: 270px; max-height: 520px; object-fit: contain; }
        .source-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 5px 9px;
            border: 1px solid rgba(255, 255, 255, .16);
            border-radius: 999px;
            background: rgba(5, 7, 6, .72);
            color: #d9e1dd;
            font-size: .72rem;
            backdrop-filter: blur(8px);
        }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 9px;
            margin-top: 13px;
            padding: 10px 12px;
            border-radius: 8px;
            background: var(--panel-2);
            color: var(--muted);
            font-size: .82rem;
        }
        .dot { width: 9px; height: 9px; flex: 0 0 auto; border-radius: 50%; background: #5a6560; }
        .dot.connected { background: var(--good); box-shadow: 0 0 0 4px rgba(79, 196, 122, .1); }
        .dot.connecting { background: var(--accent); animation: pulse 1s infinite alternate; }
        .dot.failed { background: var(--bad); }
        @keyframes pulse { to { opacity: .35; } }
        .codec-list { display: flex; flex-wrap: wrap; gap: 7px; }
        .codec-chip { padding: 4px 9px; border: 1px solid var(--line); border-radius: 6px; color: var(--muted); font-size: .74rem; }
        .codec-chip.av1 { border-color: var(--accent-dark); color: #ffd77f; background: #2b2414; }
        .warn-box { display: none; margin-top: 12px; padding: 10px 12px; border: 1px solid #76551d; border-radius: 8px; color: #ffd77f; background: #29200e; font-size: .82rem; }
        #log { max-height: 210px; overflow-y: auto; padding: 12px; border-radius: 8px; background: var(--panel-2); color: #aab6b0; font: .78rem/1.6 Consolas, monospace; }
        #log .ts { margin-right: 7px; color: #63706a; }
        #log .info { color: #8ebca6; }
        #log .warn { color: #e7b958; }
        #log .error { color: #f28d80; }
        @media (max-width: 680px) {
            main { width: min(100% - 20px, 900px); padding-top: 20px; }
            .card { padding: 14px; }
            .source-grid, .ice-grid { grid-template-columns: 1fr; }
            #btnRefresh { width: 100%; }
            .preview-shell, video { min-height: 200px; }
        }
    </style>
</head>
<body>
<main>
    <header>
        <h1>WebRTC AV1 Capture</h1>
        <p class="subtitle">Camera or shared desktop to AV1, decoded and recorded by go-av1</p>
    </header>
    <section class="card">
        <h2>Capture source</h2>
        <div class="source-grid">
            <label>Source
                <select id="sourceType">
                    <option value="camera">Camera</option>
                    <option value="display">Shared desktop</option>
                </select>
            </label>
            <label id="cameraField">Camera
                <select id="cameraSelect"><option value="">Default camera</option></select>
            </label>
            <label id="resolutionField">Camera resolution
                <select id="resolutionSelect">
                    <option value="">Browser default</option>
                    <option value="320x240">320 x 240 (4:3)</option>
                    <option value="640x360">640 x 360 (16:9)</option>
                    <option value="640x480">640 x 480 (4:3)</option>
                    <option value="1280x720" selected>1280 x 720 (16:9)</option>
                    <option value="1920x1080">1920 x 1080 (16:9)</option>
                    <option value="2560x1440">2560 x 1440 (16:9)</option>
                    <option value="3840x2160">3840 x 2160 (16:9)</option>
                </select>
            </label>
            <button id="btnRefresh" type="button">Refresh cameras</button>
        </div>
        <div class="ice-grid">
            <label class="stun-switch"><input id="stunEnabled" type="checkbox">Enable STUN</label>
            <label>STUN server URL
                <input id="stunURL" type="text" value="stun:stun.l.google.com:19302" disabled spellcheck="false">
            </label>
        </div>
        <div class="preview-shell">
            <video id="localVideo" autoplay muted playsinline></video>
            <span class="source-badge" id="sourceBadge">Camera</span>
        </div>
        <div class="controls">
            <button id="btnStart" type="button">Start stream</button>
            <button id="btnStop" type="button" disabled>Stop stream</button>
        </div>
        <div class="status-bar"><span class="dot" id="dot"></span><span id="statusText">Disconnected</span></div>
        <div class="warn-box" id="warnBox"></div>
    </section>
    <section class="card">
        <h2>Browser video codecs</h2>
        <div class="codec-list" id="codecList">Detecting...</div>
    </section>
    <section class="card">
        <h2>Log</h2>
        <div id="log"></div>
    </section>
</main>
<script>
    const sourceType = document.getElementById('sourceType');
    const cameraSelect = document.getElementById('cameraSelect');
    const cameraField = document.getElementById('cameraField');
    const resolutionSelect = document.getElementById('resolutionSelect');
    const resolutionField = document.getElementById('resolutionField');
    const btnRefresh = document.getElementById('btnRefresh');
    const stunEnabled = document.getElementById('stunEnabled');
    const stunURL = document.getElementById('stunURL');
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const localVideo = document.getElementById('localVideo');
    const sourceBadge = document.getElementById('sourceBadge');
    let pc = null;
    let localStream = null;
    let statsTimer = null;
    let previousSenderStats = null;

    function timestamp() {
        const d = new Date();
        return d.toTimeString().slice(0, 8) + '.' + String(d.getMilliseconds()).padStart(3, '0');
    }
    function escapeHTML(value) {
        return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function log(message, level = 'info') {
        const container = document.getElementById('log');
        const line = document.createElement('div');
        line.innerHTML = `<span class="ts">${timestamp()}</span><span class="${level}">${escapeHTML(message)}</span>`;
        container.appendChild(line);
        container.scrollTop = container.scrollHeight;
        console[level === 'error' ? 'error' : level === 'warn' ? 'warn' : 'log'](message);
    }
    function setStatus(text, state = '') {
        document.getElementById('statusText').textContent = text;
        document.getElementById('dot').className = 'dot' + (state ? ' ' + state : '');
    }
    function selectedCameraLabel() {
        const option = cameraSelect.selectedOptions[0];
        return option && option.textContent ? option.textContent : 'Camera';
    }
    function updateSourceControls() {
        const camera = sourceType.value === 'camera';
        cameraField.hidden = !camera;
        resolutionField.hidden = !camera;
        btnRefresh.hidden = !camera;
        sourceBadge.textContent = camera ? selectedCameraLabel() : 'Shared desktop';
    }
    function updateSTUNControls() {
        stunURL.disabled = !stunEnabled.checked || stunEnabled.disabled;
    }
    function peerConnectionConfig() {
        if (!stunEnabled.checked) return undefined;
        const url = stunURL.value.trim();
        if (!/^stuns?:[^\s]+$/i.test(url)) throw new Error('STUN URL must start with stun: or stuns:');
        log('STUN enabled: ' + url);
        return { iceServers: [{ urls: url }] };
    }
    async function refreshCameras() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
            log('Media device enumeration is not supported by this browser', 'warn');
            return;
        }
        const selected = cameraSelect.value;
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const cameras = devices.filter(device => device.kind === 'videoinput');
            cameraSelect.replaceChildren();
            const fallback = document.createElement('option');
            fallback.value = '';
            fallback.textContent = 'Default camera';
            cameraSelect.appendChild(fallback);
            cameras.forEach((camera, index) => {
                const option = document.createElement('option');
                option.value = camera.deviceId;
                option.textContent = camera.label || `Camera ${index + 1}`;
                cameraSelect.appendChild(option);
            });
            if ([...cameraSelect.options].some(option => option.value === selected)) cameraSelect.value = selected;
            updateSourceControls();
            log(`Found ${cameras.length} camera device(s)`);
        } catch (error) {
            log('Unable to enumerate cameras: ' + error.message, 'error');
        }
    }
    function cameraConstraints() {
        const video = { frameRate: { ideal: 30, max: 60 } };
        const match = /^(\d+)x(\d+)$/.exec(resolutionSelect.value);
        if (match) {
            video.width = { exact: Number(match[1]) };
            video.height = { exact: Number(match[2]) };
        }
        if (cameraSelect.value) video.deviceId = { exact: cameraSelect.value };
        return { video, audio: false };
    }
    function logCameraTrackDetails(track) {
        const settings = track.getSettings ? track.getSettings() : {};
        const size = settings.width && settings.height ? `${settings.width}x${settings.height}` : 'unknown';
        const fps = settings.frameRate ? ` at ${settings.frameRate.toFixed(2)} fps` : '';
        log(`Camera output: ${size}${fps}`);
        if (!track.getCapabilities) return;
        const caps = track.getCapabilities();
        if (caps.width && caps.height) {
            log(`Camera capability range: width ${caps.width.min}-${caps.width.max}, height ${caps.height.min}-${caps.height.max}`);
        }
    }
    async function acquireSelectedSource() {
        if (!navigator.mediaDevices) throw new Error('Media capture requires HTTPS or localhost');
        if (sourceType.value === 'display') {
            if (!navigator.mediaDevices.getDisplayMedia) throw new Error('Desktop sharing is not supported by this browser');
            return navigator.mediaDevices.getDisplayMedia({ video: { frameRate: { ideal: 30 } }, audio: false });
        }
        const stream = await navigator.mediaDevices.getUserMedia(cameraConstraints());
        await refreshCameras();
        return stream;
    }
    function stopTracks(stream) {
        if (stream) stream.getTracks().forEach(track => track.stop());
    }
    function watchDisplayEnded(stream) {
        if (sourceType.value !== 'display') return;
        const track = stream.getVideoTracks()[0];
        track.addEventListener('ended', () => {
            if (localStream !== stream) return;
            log('Desktop sharing was stopped by the browser', 'warn');
            stopStream();
        }, { once: true });
    }
    function detectCodecs() {
        const container = document.getElementById('codecList');
        container.replaceChildren();
        const caps = RTCRtpSender.getCapabilities && RTCRtpSender.getCapabilities('video');
        if (!caps) {
            container.textContent = 'Unable to query browser codec capabilities';
            return;
        }
        let hasAV1 = false;
        (caps.codecs || []).forEach(codec => {
            const name = codec.mimeType.split('/')[1].toUpperCase();
            const chip = document.createElement('span');
            chip.className = 'codec-chip';
            chip.textContent = name;
            if (name === 'AV1') { chip.classList.add('av1'); hasAV1 = true; }
            container.appendChild(chip);
        });
        if (!hasAV1) {
            const warn = document.getElementById('warnBox');
            warn.textContent = 'This browser cannot send AV1 over WebRTC. Use a current Chrome or Firefox build.';
            warn.style.display = 'block';
            log('AV1 send capability was not detected', 'warn');
        } else log('AV1 send capability detected');
    }
    function preferAV1(sender) {
        const caps = RTCRtpSender.getCapabilities && RTCRtpSender.getCapabilities('video');
        if (!caps) return;
        const av1 = caps.codecs.filter(codec => codec.mimeType.toLowerCase() === 'video/av1');
        const others = caps.codecs.filter(codec => codec.mimeType.toLowerCase() !== 'video/av1');
        const transceiver = pc.getTransceivers().find(item => item.sender === sender);
        if (transceiver && transceiver.setCodecPreferences) {
            transceiver.setCodecPreferences([...av1, ...others]);
            log('AV1 codec preference set');
        }
    }
    function waitForGatheringComplete(connection, timeoutMs = 2000) {
        return new Promise(resolve => {
            if (connection.iceGatheringState === 'complete') return resolve();
            let timer;
            const finish = timedOut => {
                connection.removeEventListener('icegatheringstatechange', handler);
                clearTimeout(timer);
                if (timedOut) log('ICE gathering timed out; continuing with available host candidates', 'warn');
                resolve();
            };
            const handler = () => {
                if (connection.iceGatheringState !== 'complete') return;
                finish(false);
            };
            connection.addEventListener('icegatheringstatechange', handler);
            timer = setTimeout(() => finish(true), timeoutMs);
        });
    }
    function statRate(current, previous, field) {
        if (!previous || !Number.isFinite(current[field]) || !Number.isFinite(previous[field])) return null;
        const seconds = (current.timestamp - previous.timestamp) / 1000;
        return seconds > 0 ? (current[field] - previous[field]) / seconds : null;
    }
    function formatFPS(value) {
        return Number.isFinite(value) ? value.toFixed(1) : 'n/a';
    }
    function reportSenderStats(capturedFPS, encodedFPS, sentFPS, outbound, limitation) {
        fetch('/stats', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                captureFPS: Number.isFinite(capturedFPS) ? capturedFPS : null,
                encodeFPS: Number.isFinite(encodedFPS) ? encodedFPS : null,
                sendFPS: Number.isFinite(sentFPS) ? sentFPS : null,
                width: outbound.frameWidth || 0,
                height: outbound.frameHeight || 0,
                limitation,
            }),
        }).catch(error => console.warn('Unable to report sender stats:', error));
    }
    async function collectSenderStats(sender) {
        try {
            const report = await sender.getStats();
            let outbound = null;
            let source = null;
            report.forEach(stat => {
                if (stat.type === 'outbound-rtp' && stat.kind === 'video' && !stat.isRemote) outbound = stat;
                if (stat.type === 'media-source' && stat.kind === 'video') source = stat;
            });
            if (!outbound) return;
            const current = {
                timestamp: outbound.timestamp,
                framesEncoded: outbound.framesEncoded,
                framesSent: outbound.framesSent,
                framesCaptured: source && source.frames,
            };
            const capturedFPS = source && Number.isFinite(source.framesPerSecond)
                ? source.framesPerSecond : statRate(current, previousSenderStats, 'framesCaptured');
            const encodedFPS = Number.isFinite(outbound.framesPerSecond)
                ? outbound.framesPerSecond : statRate(current, previousSenderStats, 'framesEncoded');
            const sentFPS = statRate(current, previousSenderStats, 'framesSent');
            const size = outbound.frameWidth && outbound.frameHeight
                ? `${outbound.frameWidth}x${outbound.frameHeight}` : 'unknown';
            const limitation = outbound.qualityLimitationReason || 'none';
            log(`WebRTC stats: capture=${formatFPS(capturedFPS)} fps, encode=${formatFPS(encodedFPS)} fps, send=${formatFPS(sentFPS)} fps, output=${size}, limitation=${limitation}`,
                limitation === 'none' ? 'info' : 'warn');
            reportSenderStats(capturedFPS, encodedFPS, sentFPS, outbound, limitation);
            previousSenderStats = current;
        } catch (error) {
            if (pc) log('Unable to read WebRTC sender stats: ' + error.message, 'warn');
        }
    }
    function startSenderStats(sender) {
        stopSenderStats();
        collectSenderStats(sender);
        statsTimer = setInterval(() => collectSenderStats(sender), 2000);
    }
    function stopSenderStats() {
        if (statsTimer !== null) clearInterval(statsTimer);
        statsTimer = null;
        previousSenderStats = null;
    }
    async function startStream() {
        btnStart.disabled = true;
        sourceType.disabled = true;
        cameraSelect.disabled = true;
        stunEnabled.disabled = true;
        updateSTUNControls();
        setStatus('Requesting capture permission...', 'connecting');
        try {
            localStream = await acquireSelectedSource();
            const videoTrack = localStream.getVideoTracks()[0];
            if (!videoTrack) throw new Error('Selected source did not provide a video track');
            if (sourceType.value === 'camera') logCameraTrackDetails(videoTrack);
            localVideo.srcObject = localStream;
            watchDisplayEnded(localStream);
            updateSourceControls();
            log('Capture started: ' + sourceBadge.textContent);
            pc = new RTCPeerConnection(peerConnectionConfig());
            pc.oniceconnectionstatechange = () => {
                const state = pc && pc.iceConnectionState;
                if (!state) return;
                log('ICE state: ' + state);
                if (state === 'connected' || state === 'completed') setStatus('Connected', 'connected');
                else if (state === 'checking') setStatus('Connecting...', 'connecting');
                else if (state === 'failed' || state === 'closed') setStatus('Disconnected', 'failed');
            };
            pc.onconnectionstatechange = () => pc && log('Connection state: ' + pc.connectionState);
            const sender = pc.addTrack(videoTrack, localStream);
            if (sourceType.value === 'camera') {
                try {
                    const parameters = sender.getParameters();
                    parameters.degradationPreference = 'maintain-resolution';
                    if (parameters.encodings && parameters.encodings.length) {
                        parameters.encodings[0].scaleResolutionDownBy = 1;
                    }
                    await sender.setParameters(parameters);
                } catch (error) {
                    log('Unable to lock camera sender resolution; adaptive resolution remains enabled: ' + error.message);
                }
            }
            preferAV1(sender);
            const offer = await pc.createOffer({ offerToReceiveVideo: false, offerToReceiveAudio: false });
            await pc.setLocalDescription(offer);
            await waitForGatheringComplete(pc);
            const response = await fetch('/offer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sdp: pc.localDescription.sdp, type: pc.localDescription.type }),
            });
            if (!response.ok) throw new Error(await response.text());
            await pc.setRemoteDescription(new RTCSessionDescription(await response.json()));
            btnStop.disabled = false;
            setStatus('Connected', 'connected');
            log('WebRTC connected; AV1 streaming started');
            startSenderStats(sender);
        } catch (error) {
            log('Unable to start stream: ' + error.message, 'error');
            stopStream();
            setStatus('Capture failed', 'failed');
        } finally {
            const connected = Boolean(pc);
            sourceType.disabled = connected;
            cameraSelect.disabled = connected;
            resolutionSelect.disabled = connected;
            btnRefresh.disabled = connected;
            stunEnabled.disabled = connected;
            updateSTUNControls();
            btnStart.disabled = connected;
        }
    }
    function stopStream() {
        if (pc || localStream) log('Stopping stream');
        stopSenderStats();
        if (pc) pc.close();
        pc = null;
        stopTracks(localStream);
        localStream = null;
        localVideo.srcObject = null;
        btnStart.disabled = false;
        btnStop.disabled = true;
        sourceType.disabled = false;
        cameraSelect.disabled = false;
        resolutionSelect.disabled = false;
        btnRefresh.disabled = false;
        stunEnabled.disabled = false;
        updateSTUNControls();
        setStatus('Disconnected');
    }

    sourceType.addEventListener('change', updateSourceControls);
    cameraSelect.addEventListener('change', updateSourceControls);
    stunEnabled.addEventListener('change', updateSTUNControls);
    btnRefresh.addEventListener('click', refreshCameras);
    btnStart.addEventListener('click', startStream);
    btnStop.addEventListener('click', stopStream);
    if (navigator.mediaDevices) navigator.mediaDevices.addEventListener('devicechange', refreshCameras);
    updateSourceControls();
    updateSTUNControls();
    detectCodecs();
    refreshCameras();
</script>
</body>
</html>
